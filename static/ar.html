<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Maintenance — Field view</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/ar.css" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div class="ar-shell">
      <div class="ar-top">
        <a href="index.html">Operations</a>
        <a href="dashboard.html">Analytics</a>
        <button type="button" id="ar-refresh">Refresh data</button>
      </div>
      <div id="ar-status" aria-live="polite">
        Hiro: fault overlay + field actions. Kanji: tool accountability. Sign in on Operations first for API writes.
      </div>
      <div id="ar-overlay" hidden>
        <h3 id="ar-overlay-title">Fault</h3>
        <p id="ar-overlay-line1"></p>
        <p id="ar-overlay-line2"></p>
        <p id="ar-overlay-line3" class="ar-overlay__tools"></p>

        <div id="ar-fault-actions" class="ar-actions" hidden>
          <label for="ar-note">Field note (appended)</label>
          <textarea id="ar-note" rows="2" placeholder="Inspection finding…"></textarea>
          <div class="ar-actions__row">
            <button type="button" id="ar-append-note">Save note</button>
            <button type="button" id="ar-verify">Mark field verified</button>
          </div>
          <p id="ar-action-status" class="ar-action-status" aria-live="polite"></p>
        </div>

        <div id="ar-tool-actions" class="ar-actions" hidden>
          <label for="ar-tool-name">Tool name</label>
          <input id="ar-tool-name" type="text" placeholder="e.g. Torque wrench" maxlength="255" />
          <div class="ar-actions__row">
            <button type="button" id="ar-tool-log">Log check-out (AR)</button>
          </div>
        </div>
      </div>

      <a-scene
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      >
        <a-marker preset="hiro" id="marker-hiro" emit-events="true">
          <a-box position="0 0.25 0" scale="0.15 0.15 0.15" material="color: #3d9cf9; opacity: 0.85; transparent: true"></a-box>
        </a-marker>
        <a-marker preset="kanji" id="marker-kanji" emit-events="true">
          <a-box position="0 0.25 0" scale="0.15 0.15 0.15" material="color: #5ee1a8; opacity: 0.85; transparent: true"></a-box>
        </a-marker>
        <a-entity camera></a-entity>
      </a-scene>
    </div>

    <script type="module" src="js/ar.js"></script>
  </body>
</html>
